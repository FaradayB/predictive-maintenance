global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'predictivecare'
    static_configs:
      # In Docker, services communicate by container name
      - targets: ['api:8000']
    scrape_interval: 15s
